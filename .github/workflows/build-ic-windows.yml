# ============================================================================
#  Build d'un client RustDesk "Info-Concepts" pour Windows x64 (interface Sciter)
#  Serveur et clé pré-intégrés (rustdesk.ic-cloud.fr).
#  A placer dans le fork :  .github/workflows/build-ic-windows.yml
#  Déclenchement MANUEL uniquement (onglet Actions -> Run workflow).
# ============================================================================
name: Build RustDesk Info-Concepts (Windows x64)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IC_SERVER: "rustdesk.ic-cloud.fr"
  IC_KEY: "4ciHrongHyOhrUM1bot6qSEvbNQ6dB94ZeD5fg2eL6E="

jobs:
  build-windows-x64:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout (avec sous-modules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rust (stable, MSVC x64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: LLVM / Clang (pour bindgen)
        run: |
          choco install -y llvm
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Dépendances natives (vcpkg)
        run: |
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
          if (-not (Test-Path $vcpkg)) { Write-Error "vcpkg introuvable sur le runner"; exit 1 }
          # On lance depuis un dossier neutre pour forcer le mode classique (le dépôt contient un vcpkg.json)
          Push-Location $env:USERPROFILE
          & $vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
          $code = $LASTEXITCODE
          Pop-Location
          if ($code -ne 0) { Write-Error "vcpkg install a échoué (code $code)"; exit $code }
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Injecter serveur + clé Info-Concepts dans config.rs
        run: |
          $cfg = "libs/hbb_common/src/config.rs"
          if (-not (Test-Path $cfg)) { Write-Error "config.rs introuvable ($cfg)"; exit 1 }
          $c = Get-Content $cfg -Raw
          $c = [regex]::Replace($c, 'pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[[^\]]*\];', 'pub const RENDEZVOUS_SERVERS: &[&str] = &["' + $env:IC_SERVER + '"];')
          $c = [regex]::Replace($c, 'pub const RS_PUB_KEY: &str = "[^"]*";', 'pub const RS_PUB_KEY: &str = "' + $env:IC_KEY + '";')
          Set-Content $cfg $c -Encoding UTF8
          Write-Host "--- Vérification ---"
          Select-String -Path $cfg -Pattern 'RENDEZVOUS_SERVERS|RS_PUB_KEY'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Sciter DLL
        run: |
          New-Item -ItemType Directory -Force -Path target\release | Out-Null
          Invoke-WebRequest -UseBasicParsing -Uri https://raw.githubusercontent.com/c-smile/sciter-sdk/master/bin.win/x64/sciter.dll -OutFile target\release\sciter.dll

      - name: Inliner les ressources d'interface Sciter (corrige la fenêtre blanche)
        run: |
          if (Test-Path res\inline-sciter.py) {
            python res\inline-sciter.py
          } else {
            Write-Error "res\inline-sciter.py introuvable (structure du dépôt modifiée ?)"; exit 1
          }

      - name: Compilation (release)
        run: cargo build --release --features inline

      - name: Empaqueter en EXE unique (portable packer RustDesk)
        run: |
          if (-not (Test-Path target\release\rustdesk.exe)) { Write-Error "rustdesk.exe non généré"; exit 1 }
          # Dossier propre contenant uniquement l'exe + la dll à embarquer
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\rustdesk.exe dist\ -Force
          Copy-Item target\release\sciter.dll  dist\ -Force
          # Dépendance Python requise par le packer
          python -m pip install --upgrade pip
          python -m pip install brotli
          # Empaquetage via l'outil RustDesk (génère un exe auto-extractible unique)
          Push-Location libs\portable
          python generate.py -f ..\..\dist -o . -e ..\..\dist\rustdesk.exe
          Pop-Location
          Write-Host "--- Recherche de l'exe empaqueté (workspace entier) ---"
          $packed = Get-ChildItem -Path . -Recurse -Filter "rustdesk-portable-packer.exe" -ErrorAction SilentlyContinue | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $packed) {
            Write-Host "Packer introuvable. Exe candidats dans target :"
            Get-ChildItem -Path target -Recurse -Filter *.exe -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName $_.Length }
            Write-Error "Aucun exe portable produit"; exit 1
          }
          Write-Host "Exe empaqueté trouvé : $($packed.FullName) ($($packed.Length) octets)"
          Copy-Item $packed.FullName "PriseEnMain-IC-Windows.exe" -Force

      - name: Publier l'artefact (exe unique)
        uses: actions/upload-artifact@v4
        with:
          name: PriseEnMain-IC-Windows
          path: PriseEnMain-IC-Windows.exe
